# =============================================================================
# Kernova-TEE - Docker Compose
# =============================================================================
# Run from project root: docker-compose -f docker/docker-compose.yml up
# =============================================================================

version: '3.8'

services:
  # Build environment
  builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/workspace
    working_dir: /workspace
    command: tail -f /dev/null
    networks:
      - kernova-net

  # Test runner
  tester:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/workspace
    working_dir: /workspace
    command: ./scripts/test.sh
    networks:
      - kernova-net

  # Web interface
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/workspace
    working_dir: /workspace
    command: python3 interface/web.py
    ports:
      - "5000:5000"
    networks:
      - kernova-net

networks:
  kernova-net:
    driver: bridge
