# =============================================================================
# Kernova-TEE - Docker Compose
# =============================================================================
# Run from project root: docker compose -f infra/compose.yaml up
# =============================================================================

services:
  # Build environment
  builder:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    volumes:
      - ..:/workspace
      - kernova-build:/workspace/service-api/service-cpp/build
    working_dir: /workspace
    command: ./scripts/build.sh --build
    networks:
      - kernova-net

  # Test runner
  tester:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    volumes:
      - ..:/workspace
      - kernova-build:/workspace/service-api/service-cpp/build
    working_dir: /workspace
    command: ./scripts/test.sh
    networks:
      - kernova-net

  # Web interface
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    volumes:
      - ..:/workspace
      - kernova-build:/workspace/service-api/service-cpp/build
    working_dir: /workspace
    command: python3 client-web/app.py
    ports:
      - "5000:5000"
    networks:
      - kernova-net

networks:
  kernova-net:
    driver: bridge

volumes:
  kernova-build:
